<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Torjo Space{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --accent: #f97316;
            --accent-dim: rgba(249, 115, 22, 0.12);
            --text-primary: #0f0f0f;
            --text-secondary: #6b6b6b;
            --text-muted: #a0a0a0;
            --bg: #fafafa;
            --bg-secondary: #f3f3f3;
            --border: #e2e2e2;
            --border-strong: #c8c8c8;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        [data-theme="dark"] {
            --text-primary: #f0f0f0;
            --text-secondary: #9a9a9a;
            --text-muted: #5a5a5a;
            --bg: #111111;
            --bg-secondary: #1a1a1a;
            --border: #272727;
            --border-strong: #383838;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            font-family: var(--sans);
            background-color: var(--bg);
            color: var(--text-primary);
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .nav-brand span {
            color: var(--accent);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-icon-link {
            color: var(--text-secondary);
            font-size: 1rem;
            text-decoration: none;
            transition: color 0.15s;
            line-height: 1;
        }

        .nav-icon-link:hover {
            color: var(--text-primary);
        }

        #theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 0;
            line-height: 1;
            transition: color 0.15s;
        }

        #theme-toggle:hover {
            color: var(--text-primary);
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 5rem;
        }

        footer strong {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ── Global utils ── */
        a {
            color: inherit;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>

    <nav class="site-nav">
        <a href="/" class="nav-brand"><span>torjo</span>.space</a>
        <div class="nav-right">
            <a href="https://github.com/faysalhassantorjo" target="_blank" class="nav-icon-link" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://www.facebook.com/faysalhassantorjo" target="_blank" class="nav-icon-link" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
            <button id="theme-toggle" title="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <span style="color: var(--accent); font-weight: 600;">$</span>
        <span>built by <strong>torjo</strong></span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const currentTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);

        const updateIcon = (theme) => {
            toggleBtn.innerHTML = theme === 'dark'
                ? '<i class="fas fa-sun"></i>'
                : '<i class="fas fa-moon"></i>';
        };
        updateIcon(currentTheme);

        toggleBtn.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateIcon(theme);
        });
    </script>
</body>

</html>
